name: Trigger Render Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    name: Trigger Render Deploy (Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set. Exiting."
            exit 1
          fi
          echo "Triggering Render deploy via webhook"
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" -o /tmp/render-deploy-response.json || true
          echo "Render response:"
          cat /tmp/render-deploy-response.json || true

